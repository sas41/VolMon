name: Release

on:
  push:
    branches:
      - main

jobs:
  # ── Generate version tag (shared by all jobs) ─────────────────────────
  version:
    name: Generate version
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
      release_name: ${{ steps.tag.outputs.release_name }}
    steps:
      - uses: actions/checkout@v4

      - name: Generate tag
        id: tag
        run: |
          TAG="v$(date -u +'%Y-%m-%d-%H%M')-$(git rev-parse --short HEAD)"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "release_name=VolMon $TAG" >> "$GITHUB_OUTPUT"

  # ── Build jobs (one runner per platform) ──────────────────────────────

  build-linux:
    name: Build (linux-x64)
    runs-on: ubuntu-latest
    needs: version
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish projects
        env:
          RELEASE_DIR: VolMon-${{ needs.version.outputs.tag }}-linux-x64
        run: |
          declare -A folders=(
            [VolMon.Daemon]=daemon
            [VolMon.GUI]=gui
            [VolMon.Hardware]=hardware
            [VolMon.HardwareGUI]=hardware-gui
          )
          for project in VolMon.Daemon VolMon.GUI VolMon.Hardware VolMon.HardwareGUI; do
            folder=${folders[$project]}
            dotnet publish "src/$project/$project.csproj" \
              --configuration Release \
              --runtime linux-x64 \
              --self-contained \
              -p:PublishTrimmed=false \
              --output "publish/$RELEASE_DIR/app/$folder" \
              -v quiet
          done

      - name: Copy installer and icon
        env:
          RELEASE_DIR: VolMon-${{ needs.version.outputs.tag }}-linux-x64
        run: |
          cp install/install-linux.sh "publish/$RELEASE_DIR/install-linux.sh"
          chmod +x "publish/$RELEASE_DIR/install-linux.sh"
          cp assets/VolMonLogo-256.png "publish/$RELEASE_DIR/app/volmon.png"

      - name: Create zip
        env:
          RELEASE_DIR: VolMon-${{ needs.version.outputs.tag }}-linux-x64
        run: |
          cd publish
          zip -r ../VolMon-${{ needs.version.outputs.tag }}-linux-x64.zip "$RELEASE_DIR/"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: VolMon-linux-x64
          path: VolMon-${{ needs.version.outputs.tag }}-linux-x64.zip
          retention-days: 1

  build-windows:
    name: Build (win-x64)
    runs-on: windows-latest
    needs: version
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish projects
        shell: pwsh
        env:
          RELEASE_DIR: VolMon-${{ needs.version.outputs.tag }}-win-x64
        run: |
          $projects = @{
            'VolMon.Daemon'      = 'daemon'
            'VolMon.GUI'         = 'gui'
            'VolMon.Hardware'    = 'hardware'
            'VolMon.HardwareGUI' = 'hardware-gui'
          }
          foreach ($project in $projects.Keys) {
            $folder = $projects[$project]
            dotnet publish "src/$project/$project.csproj" `
              --configuration Release `
              --runtime win-x64 `
              --self-contained `
              -p:PublishTrimmed=false `
              --output "publish/$env:RELEASE_DIR/$folder" `
              -v quiet
          }

      - name: Copy register script and icon
        shell: pwsh
        env:
          RELEASE_DIR: VolMon-${{ needs.version.outputs.tag }}-win-x64
        run: |
          Copy-Item install/register/register-windows.ps1 "publish/$env:RELEASE_DIR/register.ps1"
          Copy-Item assets/VolMonLogo.ico "publish/$env:RELEASE_DIR/volmon.ico"

      - name: Install WiX toolset
        shell: pwsh
        run: dotnet tool install --global wix --version 6.0.2

      - name: Add WiX UI extension
        shell: pwsh
        run: wix extension add WixToolset.UI.wixext/6.0.2

      - name: Generate MSI version string
        id: version
        shell: pwsh
        run: |
          # GITHUB_RUN_NUMBER is a free, always-incrementing per-workflow counter.
          # MSI build field max is 65535, so this is good for 65535 releases.
          $datePart = (Get-Date -Format 'yy.MM.dd')
          $v        = "$datePart.${{ github.run_number }}"
          echo "msi_version=$v" >> $env:GITHUB_OUTPUT

      - name: Build MSI
        shell: pwsh
        env:
          RELEASE_DIR: VolMon-${{ needs.version.outputs.tag }}-win-x64
        run: |
          wix build install/wix/volmon.wxs `
            -ext WixToolset.UI.wixext `
            -d "SourceDir=publish/$env:RELEASE_DIR" `
            -d Version=${{ steps.version.outputs.msi_version }} `
            -arch x64 `
            -o "VolMon-${{ needs.version.outputs.tag }}-win-x64.msi"

      - name: Create zip
        shell: pwsh
        env:
          RELEASE_DIR: VolMon-${{ needs.version.outputs.tag }}-win-x64
        run: |
          Compress-Archive -Path "publish/$env:RELEASE_DIR" -DestinationPath "VolMon-${{ needs.version.outputs.tag }}-win-x64.zip"

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: VolMon-win-x64-msi
          path: VolMon-${{ needs.version.outputs.tag }}-win-x64.msi
          retention-days: 1

      - name: Upload zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: VolMon-win-x64
          path: VolMon-${{ needs.version.outputs.tag }}-win-x64.zip
          retention-days: 1

  build-macos:
    name: Build (osx-x64)
    runs-on: macos-latest
    needs: version
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish projects
        env:
          RELEASE_DIR: VolMon-${{ needs.version.outputs.tag }}-osx-x64
        run: |
          publish() {
            local project="$1" folder="$2"
            dotnet publish "src/$project/$project.csproj" \
              --configuration Release \
              --runtime osx-x64 \
              --self-contained \
              -p:PublishTrimmed=false \
              --output "publish/$RELEASE_DIR/$folder" \
              -v quiet
          }
          publish VolMon.Daemon      daemon
          publish VolMon.GUI         gui
          publish VolMon.Hardware    hardware
          publish VolMon.HardwareGUI hardware-gui

      - name: Copy register script and icon
        env:
          RELEASE_DIR: VolMon-${{ needs.version.outputs.tag }}-osx-x64
        run: |
          cp install/register/register-macos.sh "publish/$RELEASE_DIR/register.sh"
          chmod +x "publish/$RELEASE_DIR/register.sh"
          cp assets/VolMonLogo-256.png "publish/$RELEASE_DIR/volmon.png"

      - name: Build PKG installer
        env:
          RELEASE_DIR: VolMon-${{ needs.version.outputs.tag }}-osx-x64
        run: |
          mkdir -p pkg-root/usr/local/lib/volmon
          cp -R "publish/$RELEASE_DIR/." pkg-root/usr/local/lib/volmon/

          mkdir -p pkg-scripts
          cp install/macos/postinstall pkg-scripts/postinstall
          chmod +x pkg-scripts/postinstall

          pkgbuild \
            --root pkg-root \
            --scripts pkg-scripts \
            --identifier com.volmon.pkg \
            --version "$(date -u +'%Y.%m.%d')" \
            --install-location / \
            "VolMon-${{ needs.version.outputs.tag }}-osx-x64.pkg"

      - name: Create zip
        env:
          RELEASE_DIR: VolMon-${{ needs.version.outputs.tag }}-osx-x64
        run: |
          cd publish
          zip -r "../VolMon-${{ needs.version.outputs.tag }}-osx-x64.zip" "$RELEASE_DIR/"

      - name: Upload PKG artifact
        uses: actions/upload-artifact@v4
        with:
          name: VolMon-osx-x64-pkg
          path: VolMon-${{ needs.version.outputs.tag }}-osx-x64.pkg
          retention-days: 1

      - name: Upload zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: VolMon-osx-x64
          path: VolMon-${{ needs.version.outputs.tag }}-osx-x64.zip
          retention-days: 1

  # ── Release job (runs after all three builds succeed) ─────────────────

  release:
    name: Publish GitHub Release
    needs: [version, build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          name: ${{ needs.version.outputs.release_name }}
          generate_release_notes: true
          files: |
            dist/VolMon-linux-x64/VolMon-${{ needs.version.outputs.tag }}-linux-x64.zip
            dist/VolMon-win-x64/VolMon-${{ needs.version.outputs.tag }}-win-x64.zip
            dist/VolMon-win-x64-msi/VolMon-${{ needs.version.outputs.tag }}-win-x64.msi
            dist/VolMon-osx-x64/VolMon-${{ needs.version.outputs.tag }}-osx-x64.zip
            dist/VolMon-osx-x64-pkg/VolMon-${{ needs.version.outputs.tag }}-osx-x64.pkg
